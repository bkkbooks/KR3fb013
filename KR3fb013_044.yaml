body:
  text: 其地宜與舉眾務向之須知賴有太陽授光於月星而後天乃得為光天且月星諸行皆隨太陽故直以太陽所躔為天道也論每歲太陽躔度自冬至過春分以底夏至自南而北上行自夏至過秋分以底冬至自北而南下行此為真天道而今所云南行北行諸解不同要亦古脣家见到天人相应之理以为天道南则向南宜天道北则向北宜因而分排月建之下令人以意會之耳又須知天道不獨在太陽也月與諸星何者不為天道乃其行亦皆各有定度彼此互相近遠會合衝照亦皆各有定時定處而干域動物植物以至五金八石其生長其行動其變化定時定處莫不與天應焉是以古來帝王有見於此一切舉動必準天道詳月令諸篇而此東西南北之行不過錯舉一節言之識者自無過泥也舜典載巡狩二月東五月南八月西十一月朔下與小民作訛成易同一方向此又何嘗非善法天道者哉天德則隨天道而在道其所行之路德其情也情因行而見隨識其所在如正月天道南行則天德在丁葢丁為南方
