body:
  text: 大有關係古人將此一身四體百肢都一一分屬在太陽太陰逐日相照的情勢上其意在為人欲自身平安須日日順著日月之相照不可違逆了他針灸療病尤要仔細所云人神尚無定說天寶曆謂是人之神識曹震圭又謂非人之神識是六氣陰陽所在表裹云太白遊方說太白金星也五星惟金星光大一切形物抵向著他便顯有影而此有影之方即借為太白出遊之方論人婚嫁之事夫婦二人共是一人萬萬莫相抵觸若相抵觸即平時相照顧相和好的情分有缺了豈不是有了黑影一般故托言太白逐日遊方不宜迎婚嫁娶往來抵向以示意也其云一二等是者謂無時不當以此為戒云東西等方者謂無處不當以此為戒也長短星說曹震圭曰長者過短不及也市貿納財交易立券最要中平過與不及皆志當忌至於裁衣自求可體豈
