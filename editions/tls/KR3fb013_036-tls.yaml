body:
  text: 乃國家必欲無鋪註成曆者亦非謂其有必然之效正緣民心信向日久幫因其習俗而畫一以同之未必非治平之一助動爾今將民曆首尾鋪註諸欽具説於後年神方位圖説此一圖乃造修營的一個大規模葢凢城廓宮殿與夫四囘錯處民居共總是本國內顯設之形象務須齊整美觀方見得中華與卑陋小邦不同然所謂齊整美觀者大要有二一是此例相稱一是色樣不同譬人一身頭腹手足耳目口鼻毛髪齒牙其部位安置大小長短俱有此例又彼此式樣各成其一而或紅或白或黑各色又自分明備是二者立見得人形特為俊美而國家顯設之形象其須備是二者亦然曷觀此圖中之九宮乎古傳禹治洪水時洛水有龜其昔貧文戴九履一左三右七二四為肩六八為足而五居其中此數學之祖也後人證合八卦分配八方并中央為九宮又別以七色而挨次逓遷以成九圖詳覽此圖上下左右以及中央從橫斜正聯之
