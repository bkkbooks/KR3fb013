body:
  text: 有或長或短之理而其關以為忌者謂長短星指金火也金火之氣能毀萬物故忌之長星金星長庚短星丙丁火也百忌説此是總記避忌的一個目錄分明是前代人行事如此相傳已久後人不忍背之而曆家載之於曆令天下處處同是一樣風俗而已義詳一二等篇祀竃說洗頭遊禍等日附禮日國之大事惟祀與戎古人最重祀典彼時尚未有近世所稱諸神竝無滛祀而祭享家廟必恪必動則自天子以至庻人皆有其禮葢所以展孝思也國家以孝教天下故民曆註祭祀獨多至此所謂祀竃又自有説人在天地間無日不受上帝生養鴻恩而上帝生養蒸民功用昭彰處莫過於竃人非食不生食非竃不熟今人向竃稱司命故修祀典以報答之則是祀於竃所以報司我命者非祀竃也且祀不徒報又兼有祈火能養人亦能害人從來為民害者必日兵火可見火之為害不下於兵然民間炊燢烹飪
