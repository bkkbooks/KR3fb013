body:
  text: 新曆曉或內一則修政曆法湯若望著或問天行盧人事相應以此曆有推筭鋪註二事今云依西法造曆則是鋪註亦西法矣曉之日自前朝奉旨修曆秪因該監所推交食不俁皆由舊法七政差訛乃始決議改修所謂改修者皆關推算非鋪註也二十年來著成新法曆書百十餘卷皆天行理數之學創法者之所指授受法者之所講求皆推算非鋪註也曆成恭逄聖明御宇特鑒新法與于行密合分毫不爽遂用造曆頒行則是所用之西法皆關推算之事而該監鋪註尚仍舊例非西法天文實用之鋪註也
  hash: sha256:f379db0a77c67108fa56ebd44b17bc68b2647b9ea8308d51c61871684fcb9912
