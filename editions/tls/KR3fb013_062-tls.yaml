body:
  text: 附摘欽定新曆測驗紀略內云康熙八年奉旨命欽天監選擇起建太和殿日期內院令南懷仁同選南懷仁囘稱凢關係天文曆法如某日日月五星在某宮某宿某度某日時刻相合相對順行逆行等項諸凢有據者南懷仁可以預定并可以測驗又凢天下與天上相應之效驗如某日宜療病針刺宜沐浴宜伐木宜栽種與收成等項南懷仁依天象實理實據亦可以預定若云某日吉某日凶等項則南懷仁未見有何實據故不敢妄定等因囘明在案本是輔國公班傳旨云皇上不呌你選擇只問曆下下鋪註與你曆上所用之支干相同與否南懷仁對日若論支干新舊二曆如一若論鋪註原不關係天行非從曆理所推而定惟從明季以來沿習舊例而行今南懷仁所推者皆天文實用曆法正理而已此二
