body:
  text: 故為自然之相因今之鋪註其所以然不過某一干支等件與此一日相遇而有此相遇註有某效安排附合悉出人意是其效竝非生於支干本體內之力量安得與所以然有自然之相因乎況從來人意能召吉凶必不能命吉凶而人意之所安排附合者愈益不能命吉凶即如平日註平治道塗破日註破屋壞垣此等皆取其字義相關夫字有二一點畫一意指無論平字破字之點畫與道塗垣屋無涉即就意指論謂直日之平與破與道之平屋之破同一解則可謂直日之平能命道之平直日之破能命屋之破不待智者而知其必不然以其所以然本體之內與其效絕無自然之相因也所以然既與其效無自然之相因無惑乎同是依選擇行此一事者不啻千萬而後來吉凶之不齊亦不啻千萬也李衛公曰紂以甲子亡武以甲子與又曰宋武帝以往亡日起兵而曰我往彼亡後果克之由此觀之鋪註之效可知矣公又曰天官時日明將不法暗將拘之即一兵事而他事類此矣陳搏日智者不拘泥此斯言豈無謂乎
  hash: sha256:5751303c5b691325248305f7dc492c2c99a4f6ad700d4039d7eb59e9f14680b2
