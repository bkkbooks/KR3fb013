body:
  text: 耶穌會士湯若望纂著南懷仁校訂於鋪註見後人愛慕前人之意凢人生今之世其所資以生以養以安者盡是古人遺留下的規矩制度就如農桑醫藥冠婚祭葬棟宇衣服器具等類何一是今時所制何一非昔時所遺為此今人無日不在古人開創恩德之中免不得常常要懷景仰之心動思齊之想不便諸事遵守其遺法還無論大事小事各有時向宜忌為是古人所重月令日天子乃以元日祈穀於上帝乃擇元辰又日擇元日命民社又日是月之末擇吉日大合樂顧命有牑間南向西序東向東序西向西夾南向之文而記亦曰四面之坐象四時也也莫違背了他這豈不是後人愛慕前人之原意今論愛慕的本情既然愛慕此一人必定願與他同時居同居服同服言同言行同行事同心福同享如此方遂其願然而有所不能也卻一時間得了他用過的遺物制下的遺規就似得了珍寶拳拳服膺不忍釋去便像親炙他音容一般這纔是愛慕的本情試觀鋪註
  hash: sha256:e5fbc77e0e9320f8d7639a613c8c2ebe20bc101f1183c3fae1d1a9af594b6888
