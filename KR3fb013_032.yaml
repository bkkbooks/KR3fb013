body:
  text: 在天為何宮度是何性情應與天域有何關係生何效驗也為此年年同此一節而每每今年所注逈異於上年若使果本天行注曆則每年同是此節即同是太陽到此宮度同是此一性情緣何所注有不同且相反乎此如甲年春分日注出行乙年不注出行是不同也甲年春分日注宜出行乙年注不宜出行是相反也可見此郵行與否皆與春分無涉是為鋪注不本於天行所為名行性情與下域有關係者比如月為濕宗當其朔而生明下物之濕亦生當其望而光滿下物之濕亦滿濕多蟲多植物受損故是時不宜栽植又月滿不宜伐木亦以濕多易腐也再廣言之在天月生明在人身生髓禽獸亦然月光虧髓則減魚腦其一證也此與海潮隨月同是一理然不但月七政恆星皆與下域形物相應人身諸病尤關天行所以西曆悉照天行鋪只是謂真實有據之宜忌而今之時憲曆止用西法扒算未及用西法鋪注也格物家論有此所以然即有此效效與所以然有自然之相因如日生光火生熱日與火為所以然而光熱其效也其效生於所以然本體之內而不生於外
