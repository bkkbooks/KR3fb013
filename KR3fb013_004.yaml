body:
  text: 數千百年之久文詞殘缺意旨多晦澁而未明所賴後之君子虗心考求曲探旁通而其理始出有如夜分覔物手持燭篝光亮見於篝外義理見於言外茍不求之言外而徒泥其文何異滅燭息光空持一篝暗中摸索終無所提矣豈不亦羞古人而誤來學乎余自分鹵鈍祇緣身典曆務如客之殷勤過問者時
