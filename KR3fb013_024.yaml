body:
  text: 曆例曰立曆以布天下教民有所決從免致惑亂而國不異政家不殊俗使天下之人皆得歸從一定之理而不悖亦令後世永遵無敢妄逞臆見以惑人也宋太史令吳景鸞曰天地間不過陰陽二氣五行生尅其要根極於理神殺星曜名號雖殊總之陰陽消息衰王向背而已又曰曆中設名神殺知者自見於言外明太史令劉基曰曆日頒行天下使天下之人獲覩四時運行之全探見天道盈虛之縕由是窮理以明天道誠以達本用之於身行之於家用之於國達之天下使國不異政家不殊俗大回太古之風以成煕皞之治以紹先王之統選擇書首載洪武九年二月內奉旨著欽天監將諸家選擇的文書仔細考究務要歸一因從前文書多了無一定的說各持己見日時多不的確從今諸般雜書許令送赴所在官司燒毀敢有藏匿及使用者竝行處斬曆面載曆日頒行天下僞造者依律處斬有能告捕
  hash: sha256:8037d72cc31dda5064d097c38c8c2c902556750319d2affee4dd5f859c39abb2
