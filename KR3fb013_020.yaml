body:
  text: 般以便遵守了還又見各處民情大小事要選擇日時為是前代相傳已久習以為常從來治國者修其教不易其俗齊其政不易其宜這豈可違抅他只因衍數繁多人持一説份爭不了未免又誤民事不如畫一個定規從中去取勒成一書也算做授時一類付與曆官鋪注在民曆上頒行令到處都依著鋪注上行方是個一道同風的氣象這等看將起來鋪注有兩個緣故一是人心遵信古昔愛戴前代的原意一是一好惡同風俗相期永遠太平為此二故所以曆家鋪注數代相沿至今不改也以經傳證上論鋪注之故已詳上論然非臆説也雜引經傳證之大學引詩前王不忘句而申明之日君子賢其賢而親其親小人樂其樂而利其利明大學士泰嶽張氏解之日垂謨烈以佑啓後人是其賢也後來的賢人們都守其模範而賢其賢創基業以傳與子孫是其親也後來的王者都有所承藉而親其親治安天下使世世享太平之福是他遺後人樂處而後民則
