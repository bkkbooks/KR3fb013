body:
  text: 有定所定時如此人在天地之間自當順天地之道日用事物亦必各有定時有定所所與時定而後事物成而日用裕此之謂太平也曆家得此意而施之於鋪註劉伯溫曰曆日頒行使人獲覩四時運行之全探見天道盈虛之縕由是窮理以明天道誠以達本用之於身行之於家用之於國達之天下使國不異政家不殊俗大囘太古之風以成熙皞之治以紹先王之統豈不誠然哉又須知天下之治亂心有其端端不必在大也尋常日用皆不可忽假如當術數繁與之時一定父子共圖交易而復期甲日子期乙日兄弟同居擬闢一門乃兄欲東向弟欲西向議論不決事無由成比着那古初禮教未明子遭親喪而或欲三年又或不欲三年婚娶合二姓之好而或用媒妁又或不用媒妁大小不同同為乖迕家不可得而齊國不可得而治矣乃自曆有鋪註而日時方向宜甲宜乙宜東宜西各有定制明載曆上頒行況這諸般宜忌原是他平時所尚今得朝廷曆註書一從此不為私見所惑私意所牽民用前面庻績熙易所
