body:
  text: 附摘恭進辛巳年七政經緯新曆一疏崇禎十三年十二月督修曆法李天經上內稱如交食經緯晦朔弦望及節氣七政當遵旨以更新如神煞宜忌月令諸欸仍用舊法庶可備畫一之規模矣恭進萬年賓曆一疏順治元年七月修政曆法臣湯若望上內稱曆中所載方位神煞用事等項原無度數可馮悉皆不用推算不過止對日下干支照舊本直抄填注敬陳本局應行緊要新法事宜一疏順治元年十月修政曆法臣湯若望上內稱考驗七政性情原與人事各有所宜不明此理則一切水旱災荒無從預修救備之術而兵農醫買總屬乖違臣西庠是以有天文實用一書已經纂譯首卷未暇講求合無恭請敕下臣局陸續纂成嗣後悉依實用新法鋪注庶國計民生大有禆益矣得旨下部未覆
  hash: sha256:2aacd6ac0c009507cbe102cbb7f4fa3822a91ed501896e10e2979a11b639aa09
