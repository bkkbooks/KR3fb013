body:
  text: 有客問於余曰附曆之鋪註此亦西法否乎曆家何為而有此宜興忌之紛乎余應之曰鋪註之非西法進陳有䟽曉世有説刋附曆書非一日矣至所謂鋪註之紛紛其亦據理解之乎夫取平必以準取直必以繩理亦士君子論斷古今之準繩也舍理烏能決一辭然而曆學相傅歷
  hash: sha256:b5ff5ca26ea5765f78d0053b08d6834441b9119a67c10da597ba862bf3503ac2
