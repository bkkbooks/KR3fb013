body:
  text: 有客問於余曰附曆之鋪注此亦西法否乎曆家何為而有此宜興忌之紛乎余應之曰鋪注之非西法進陳有疏曉世有説刋附曆書非一日矣至所謂鋪注之紛紛其亦據理解之乎夫取平必以準取直必以繩理亦士君子論斷古今之準繩也舍理烏能決一辭然而曆學相傅歷
  hash: sha256:7156d34aea3726c1a6b6a55758f20b8a31d8879ab89fbdbf58d95eef305bd97e
