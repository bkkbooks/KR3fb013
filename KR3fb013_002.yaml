body:
  text: 有客問於余曰附曆之鋪注此亦西法否乎曆家何為而有此宜興忌之紛乎余應之曰鋪注之非西法進陳有疏曉世有說刋附曆書非一日矣至所謂鋪注之紛紛其亦據理解之乎夫取平必以準取直必以繩理亦士君子論斷古今之準繩也舍理烏能決一辭然而曆學相傅歷
  hash: sha256:c89eb90f3ff7b87443aeec690a85d9cbbdc07f7ea136dc902c62f74465b31bba
