body:
  text: 含哺鼓腹以享其所遺之樂分田制里使百姓每永遠為業是他與後人的利益而後人則安居粒食以享其所遺之利中庸曰非天子不議禮不制度不考文張氏解之曰制禮作樂是國家極太事體必是天子然後可以定一代之典章齊萬民之心志中庸又曰王天下有三重焉為其寡過矣乎張氏解之曰王天下的君子有議禮制度考文三件重大的事行於天下則有以新天下之耳目一天下之心志由是諸候奉其法而國不異政百姓從其化而家不殊俗天下之人其皆得以寡其過失矣乎蕘典日敬授人時昨天氏解之日曆造成了又要一心敬謹頒行天下授與有司使天下人都依曆本上說話舜典詳巡狩所行之事日協時月正日張氏解之日接見諸侯因察侯國中時候之早晚月令之大小與夫日辰之甲乙比義和所頒布的曆書何如有不合的就責他改正務使同奉朝廷的正朔
