body:
  text: 於鋪於鋪注是從人愛慕前人之意原鋪注附曆頒行之故以經傅證上論以理證上論年神方位圖說月建說天道天德等說月建下九宮說天恩天赦等說太歲出遊說日遊說人神說太白遊方說長短星說百忌說祀竃說洗頭遊禍等日附男女宮及周堂圖說
