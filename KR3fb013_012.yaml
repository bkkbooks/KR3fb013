body:
  text: 於鋪於鋪注是從人愛慕前人之意原鋪注附曆頒行之故以經傅證上論以理證上論年神方位圖説月建説天道天德等説月建下九宮説天恩天赦等説太歲出遊説日遊説人神説太白遊方説長短星説百忌説祀竃説洗頭遊禍等日附男女宮及周堂圖説
