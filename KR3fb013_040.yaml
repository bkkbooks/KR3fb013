body:
  text: 為將軍之妻蠶官震圭謂是公桑蠶室之官蠶命震圭謂是蠶室之有養生也魯門經日刑戮之謂也金剛火強各守其方木落歸根水流趣末歲破伯溫謂太歲所衛之地破敗五鬼乾坤寶典日五行之精氣也震圭日天地之運五行之精伯溫日五行錯亂溷雜之氣有如五鬼氣也鬼氣乃不生發之當氣也劫殺伯溫日一名害氣即本年昏濁絶氣災殺神樞經日五行陰氣之位也歲殺神樞經日陰氣尤毒謂之殺伯溫日三殺乃陰陽之毒氣也喪門伯溫日歲前三位為滿位與白虎衛故稱喪門吊客震圭謂是歲君之賓客伯溫日吊客屬水乃本年之退氣黃幡伯溫謂其居在辰戌丑未之地屬土其色黃比為歲君之旗幟豹尾乾坤寶典日是亦旌旗之象用豹尾為之義取其所向疾速也震圭亦稱為先鋒之象伯溫日豹尾居對黃幡亦四土之地故日豹尾亦如歲君之旗幟也飛廉神樞經謂為歲之廉察使君之象震圭謂與大殺同義五鬼寶典暨震圭皆謂五行之精氣大耗小耗伯
