body:
  text: 勅賜通徵教師光祿大夫加從一品通政使司通政掌欽天監印務湯若朢纂著加正四品左監副又加一級劉有慶加正四品右監副又加一級周胤加從六品主簿又加一級掌秉加從五品春官正宋可成加正五品夏官正又加一級李祖白加正四品中官正又加一級賈食琦加正五品秋官正又加一級宋簇加正五品冬官正又加一級朱光顯加正七品官保章正又加一級劉有泰五官保章正張問明加監正御官相度事又加一級杜如預五官靈臺即加一級張其淳五官靈臺即黃鞏五官挈壺正加一級楊弘量加正八品五官司曆又加一級戈繼文
