body:
  text: 也他月倣此月厭月殺等亦倣此夫在天日為元光月為次光下域萬物之生長皆賴有此二光但月本無光借日之光以為光因其所在近日遠是會是望日情勢不同其本體力量亦有增減盈虛不同或名為德為合或名為空又或名為厭為殺而萬物生長之情勢必亦應之也此以下則依次布候歲十二月二十四氣七十二候氣與候各分列月建之下氣證諸天候則指物而見遂遍及於風雨雷電蟲魚鳥獸草木各等焉月建下九宮説九宮義見方位圖説其列之每月下者則以各宮之遁轉合離向背每月不同所以象陰陽之消長五行之變化天道之往還品物之榮枯每月不同也曹震圭引經日九宮之色與數像萬物之生死劉伯溫日九宮之色屬五行之性天恩天赦等説天恩天赦等名其義皆由天道及五行扒出與前天德月德同意曆家省筆總注曆後令普天下人率作
