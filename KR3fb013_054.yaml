body:
  text: 鼓鑄陶冶等事見選擇書祀竃條內一切以火為功稍有不謹身家為燼命不克存然則舉祀以祈求上祐又豈可忽乎緣此祀竃擇用六癸屬水日以寓謹防火災之意洗頭遊禍天火上朔等日義見天恩天赦說不更贅男女宮及周堂圖說此二欸實寓嫁娶夫婦之理夫婦好合聯二為一如男女官二數合為一數男數順女數逆此與嫁娶周堂圖順數逆數同意曹震圭曰大月從夫順數小月從婦逆數時夫尊而婦卑陽順而隊逆之理也又日陰陽相逆行後來相合以作大會須知夫婦宜順天道而行太陽如夫太陰如婦泛而論之太陽向西順行論帶行太陰向東逆行論本行因其相照相合相會以生養萬物夫婦相結第一為生育以傳子嗣豈不宜上倣太陽太陰之照之合之會乎周堂圖八字各有意義諸家解之不詳一說云第與堂為梱以外屬夫廚與竃為梱以內屬婦易曰男正位乎外女正位乎內而天下定正謂此也人娶以著代也人子思嗣親
