body:
  text: 每各一三各成十五之數奇偶多寡不一而此例勻稱得宜凢葢造者必求比例前後偏正各宜相稱而此其象矣又此圖既具諸色而諸色又每歲逓遷雖則周流八虛悉有定序不亂凢葢造者必求方向今年向此明年向彼舍其舊而新是圖而此又其象矣神樞經日修營宅舍當依此圖豈不誠然哉九宮外周分八方所署星殺略解於後大歲曆家相傳木星像也子年在子丑年在丑曆十二年而一周每年所在之方葢造修營不可向之曹震圭日太歲木星也以十二年行一周天一年徒一次劉伯溫曰太歲木星之精一歲之君也為眾星殺之統領一年一位周流其方太陰伯溫謂土星之精震圭則日太陰者辛酉之位金星也大將軍神樞經以為歲之大將震圭以為西方白虎之象其體屬金奏書震圭日水星也此為歲君之御史諫臣愽士震圭日火星也比為掌天子明堂之官力士伯溫謂其位在五行休廢之處掌居四隅比為歲君之所役使蠶室伯溫謂其位在將軍後三辰此
  hash: sha256:1faa78fc09d84a2ae1333e6958120bd6e86f6af24da008aa9c7e028766358b56
