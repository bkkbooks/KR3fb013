body:
  text: 與事皆依一樣時候以同風俗也曆事明原謂拜官用天喜口或月德合日者正緣拜官庂事為喜於情為和合也然則天恩天赦等日其所宜行之事可推而知之矣太歲出遊說曹震圭曰太歲諸神陰氣之化也蓋自子至巳乃陽氣建王之辰故陰氣不敢用事而受制於陽氣遂託言其出遊也日遊神說太陽之行至速借名遊神其光遍滿六合吾人終日身不離家無論於彼於此處心行事皆須光明洞達如與太陽相接一般所謂行不愧屋漏也其言不宜巡産室掃舍宇設牀帳借言其不可妄有動作耳某日在北某是在西而又某日出外此等要皆古來相傳發嘴因而採附於曆以示警戒所謂可使由不可使知者曆家多用此意也人神說欲明此一節之理須知太陽太陰之相照原與人身
  hash: sha256:76dc9d27d285a8e0d6ec247478957a2867f325366f4404725c3dff652326f4c1
