body:
  text: 溫謂太歲衝破之地氣巳耗散而小耗則謂其有漸耗之義也官符伯溫謂在歲前四辰即歲君之一官病符震圭曰五行氣衰之辰死符伯溫曰屬水與小耗同伏兵伯溫謂尅泄之氣若埋伏之兵大禍義同伏兵畜官震圭曰畜者養也是養畜之官大殺伯溫謂為本年極旺之氣若大振軍旅也金神洪範篇日金神者太白之精白虎伯溫亦謂屬金星此其大槩也以上諸星殺每年各有方位總不越陰陽五行合離生尅之理蓋與百工營造有關係焉又此圖所用名色多屬比似觀者勿泥月建説直日列宿下又分列黃黑道而建其首也曆家以十二支置十二月正月應為寅然而一交正月節寅日必與建期二月應為卯然而一交二月節卯日必與建期故稱正月建寅二月建卯云他月倣此天道天德等説月建下首注節氣隨用天道可見此所謂道即是太陽所躔之道寶典日天道者天之元陽順理之方也
