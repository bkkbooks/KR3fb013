body:
  text: 欸項如今民間習以為常豈不誠然是此意乎蓋緣我生也晚既不得與古人同時而又並不得想見其衣冠徘徊其宅里則惟欽仰芳蹤趨其所必趨避其所必避便是日用諸事各有宜忌初時奉為身律久之垂為家規又久之傅為鄉俗朝廷因而採之載之民曆這便又升為國政了然總是由後人愛慕前人做來的故説於鋪注見後人愛慕前人之意也原鋪注附曆頒行之故古之王者撫有天下必須首頒正朔雖則敬授人時重在稼穡上卻將那定民志齊民俗要永遠太平之意默寓於其中所以舜典協時月正日與同律度量衡説在一處正可想見這協與正也不過是要同歸於一惟恐小民紊亂干支錯了節氣違天道誤人事於民用大有所妨故不憚於巡狩時協之正之直須東作南訛西成朔易普天下四方盡皆時至事起才完了協正之本願也然而小民日用除稼穡外還有冠婚葬祭棟宇衣服各等許多事件朝廷家也魯預先酌定一個禮節安徘一個規矩與同律度量衡一
