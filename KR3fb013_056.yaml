body:
  text: 不勝優愳故于翁姑獨有遜避焉五姓修宅説姓有百千括以五音分屬五行而生尅之理備于是各有所不宜之月矣鬼賊氣絕假託之名耳曆首方位為修營而設今又終以修宅是知營造為國家所最重云又姓本於先代修宅宜忌取義於五姓倘亦有水源木本之思教人追始返古克承先烈意乎詳觀民曆首尾鋪註之説總是教人稟時王之正朔愛古昔之遺風順天地之道守當然之理一舉一動皆有定向不敢妄動而國家一道同風之盛治由此而致也國家大小事宜代有損益惟民曆鋪註千年不易豈載見而然哉
  hash: sha256:7b326daf36854d6607f89db19d290e5e4f1a39cf5a8247c085315a670fa990c7
