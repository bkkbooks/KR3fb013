body:
  text: 不勝優愳故于翁姑獨有遜避焉五姓修宅説姓有百千括以五音分屬五行而生尅之理備于是各有所不宜之月矣鬼賊氣絶假託之名耳曆首方位為修營而設今又終以修宅是知營造為國家所最重云又姓本於先代修宅宜忌取義於五姓倘亦有水源木本之思教人追始返古克承先烈意乎詳觀民曆首尾鋪注之説總是教人稟時王之正朔愛古昔之遺風順天地之道守當然之理一舉一動皆有定向不敢妄動而國家一道同風之盛治由此而致也國家大小事宜代有損益惟民曆鋪注千年不易豈載見而然哉
  hash: sha256:e433c5f5be5352133357080d4a214f151fc4a09c438ecebd406528ae89d41de7
