body:
  text: 謂成天下之亹亹不其然乎又須知凢事不成於二三而成於一此必然之理身事家事國事盡然此如㓜童誦讀必期三到謂口到眼到收到也其實口眼心既到既耳亦無他聽既鼻亦無他臭既手足亦無他動內三司外五司一齊竝注在誦讀上了此是身事由身以推之家必也父子兄弟如一身由家以推之國必也朝野臣民如一家然後可望家之齊國之治而天下之平又推此可得矣由此觀之既謂鋪註是化天下為一國化國為一家化家為一身之道誰云不可國家治曆必兼鋪註頒行以同風俗以基治平甚盛意也至問所據以註者則非本於日月星宿行天之性情也夫日月星宿行天各有度數各有本行之理我朝巳用西法改下成曆事屬推算竝通徹天行之理至於鋪註之法實由古人自以意見就支干五行八卦黃黑二道各等貫串附合撰出許多宜忌以決人疑竝與天行無涉其中即有論節氣者亦但就節氣先後幾何日或某節氣逄某支耳何嘗論此節
