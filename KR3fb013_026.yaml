body:
  text: 者官給賞銀伍拾丙如無本監曆日印信即同私曆禁行私曆至用印信所以示嚴重也以理證上論論後人敬愛前人這意思就與子孫不忘祖父點賢不忌古昔先王同是一理最為有益治平夫世遠人亡目不得接其形耳不得聆其音尚猶聞風景慕取法其遺規何況眼前現在君父而敢或不忠不孝乎既欲孝親必不忍隕墜其家聲既欲忠君心不忍背違其國法茍能如是於治平乎何有王者見及於此諸凡大小事皆就民心之所向往斟酌損益而定為時王之制故民心從之也輕而一道同風之氣象可坐而致此曆所以有鋪注也至於鋪注之本亦不過如曆事明原所稱教民順天地之道而已夫天地各循其道故天施而地承以成化育之功然所謂道者二一日所一日時論天日不南而北行為春夏日不北而南行為秋冬其所一定於是氣候寒暑各應其時矣論地氣不切附土而切附水水不切附火而切附氣其所一定於是風雨露雷各應其時矣天地之
